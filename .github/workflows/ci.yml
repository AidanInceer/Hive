name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Lint & Test Python ────────────────────────────────────────────────────────
  python:
    name: Python lint & test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [agent, orchestrator]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.component }}/requirements.txt

      - name: Install dependencies
        run: |
          cd ${{ matrix.component }}
          pip install -r requirements.txt
          pip install ruff pytest httpx

      - name: Ruff lint
        run: ruff check ${{ matrix.component }}/

      - name: Ruff format check
        run: ruff format --check ${{ matrix.component }}/

  # ── Build & Test Go CLI ───────────────────────────────────────────────────────
  go:
    name: Go build & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: cli/go.sum

      - name: Go vet
        run: cd cli && go vet ./...

      - name: Go build
        run: cd cli && go build -o ../hive .

  # ── Docker build (no push) ───────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [python, go]
    strategy:
      matrix:
        include:
          - context: agent
            image: agent-image
          - context: orchestrator
            image: orchestrator-image
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          tags: ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── K8s manifest validation ──────────────────────────────────────────────────
  k8s-lint:
    name: Validate K8s manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeval
        run: |
          curl -sL https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz | tar xz
          sudo mv kubeval /usr/local/bin/

      - name: Validate manifests
        run: |
          find k8s -name '*.yaml' -exec kubeval --strict {} +

  # ── Release binaries (on tag) ────────────────────────────────────────────────
  release:
    name: Release binaries
    runs-on: ubuntu-latest
    needs: [python, go, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd cli
          go build -ldflags="-s -w" -o ../hive-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: hive-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
