apiVersion: v1
kind: ConfigMap
metadata:
  name: hive-config
  namespace: hive
data:
  # Ollama is running on the Windows host.
  # host.docker.internal resolves to the host from inside minikube pods (docker driver).
  LLM_BASE_URL: "http://host.docker.internal:11434/v1"
  LLM_MODEL: "qwen2.5-coder:7b"
  MAX_TOKENS: "4096"
  TEMPERATURE: "0.6"
  AGENT_TIMEOUT: "120"
