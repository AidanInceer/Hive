# ── RBAC for Hive Orchestrator ──────────────────────────────────────────────────
# Allows the orchestrator pod to create ephemeral K8s Jobs for agents,
# watch their status, read pod logs, and clean up finished Jobs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hive-orchestrator-sa
  namespace: hive
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hive-job-manager
  namespace: hive
rules:
  # Jobs — full lifecycle
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Pods — read status & logs
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hive-orchestrator-job-manager
  namespace: hive
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: hive-job-manager
subjects:
  - kind: ServiceAccount
    name: hive-orchestrator-sa
    namespace: hive
